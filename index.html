<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Word Runner" />
  <title>Word Runner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Word Runner</h1>
        <p>Puzzle after puzzle, no waiting.</p>
      </div>
      <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle theme">🌙</button>
    </header>

    <main>
      <details class="panel controls" id="puzzleControls" open>
        <summary>New Puzzle <span class="controls-chevron">▾</span></summary>
        <div class="controls-inner">
          <label for="wordLength">Word length</label>
          <select id="wordLength"></select>
          <button id="newGameBtn" type="button">New puzzle</button>
        </div>
      </details>

      <section class="stats" aria-label="Statistics">
        <div><strong id="playedStat">0</strong><span>Played</span></div>
        <div><strong id="winsStat">0</strong><span>Wins</span></div>
        <div><strong id="streakStat">0</strong><span>Streak</span></div>
        <div><strong id="bestStat">0</strong><span>Best</span></div>
      </section>

      <section id="message" class="message" role="status" aria-live="polite"></section>
      <section id="board" class="board" aria-label="Game board"></section>
      <section id="keyboard" class="keyboard" aria-label="Keyboard"></section>

      <div id="thanksModal" class="thanks-modal" hidden role="status">Thanks for the feedback!</div>

      <section id="feedback" class="feedback" hidden aria-label="Word feedback">
        <p class="feedback-prompt">How was that word?</p>
        <div class="feedback-actions">
          <button type="button" id="thumbsUpBtn" class="feedback-btn" aria-label="Good word">👍 Good</button>
          <button type="button" id="thumbsDownBtn" class="feedback-btn feedback-btn--down" aria-label="Ban this word">👎 Ban it</button>
          <button type="button" id="skipFeedbackBtn" class="feedback-btn feedback-btn--skip">Skip</button>
        </div>
      </section>
    </main>

    <footer>
      <p>Type or tap letters. Guesses must be valid dictionary words.</p>
    </footer>
  </div>

  <script src="dictionary.js"></script>
  <script src="app.js"></script>
</body>
</html>
